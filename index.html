<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gym Progress</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00ff95">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Gym Progress">

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

button{
background:#00ff95;
border:none;
padding:10px;
margin:5px;
border-radius:8px;
font-size:16px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:80%;
}

.rutina{
background:#1c1c1c;
padding:10px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.eliminar{
background:red;
color:white;
}

</style>

</head>
<body>

<h1>Gym Progress</h1>

<div>

<input id="nombreRutina" placeholder="Nombre de la rutina">

<button onclick="agregarRutina()">
Agregar
</button>

</div>

<div id="listaRutinas"></div>

<script>

let rutinas = JSON.parse(localStorage.getItem("rutinas")) || []

function guardar(){
localStorage.setItem("rutinas", JSON.stringify(rutinas))
}

function render(){

const lista = document.getElementById("listaRutinas")

lista.innerHTML=""

rutinas.forEach((r,index)=>{

const div=document.createElement("div")
div.className="rutina"

div.innerHTML=`
<span>${r}</span>
<button class="eliminar" onclick="eliminarRutina(${index})">
Eliminar
</button>
`

lista.appendChild(div)

})

}

function agregarRutina(){

const input=document.getElementById("nombreRutina")

if(input.value==="") return

rutinas.push(input.value)

guardar()

input.value=""

render()

}

function eliminarRutina(index){

rutinas.splice(index,1)

guardar()

render()

}

render()

</script>

</body>
</html>
