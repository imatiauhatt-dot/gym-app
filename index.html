<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gym Progress</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff95">

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding:20px;
}

h1{
color:#00ff95;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,select{
width:90%;
padding:10px;
margin:6px;
border-radius:6px;
border:none;
}

button{
padding:10px 16px;
margin:6px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.add{background:#00bfff;}
.save{background:#ffaa00;}
.delete{background:#ff4d4d;}

.exercise{
background:#222;
padding:10px;
margin:8px 0;
border-radius:8px;
}

.lastStats{
font-size:13px;
color:#aaa;
margin-bottom:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>GYM PROGRESS</h1>

<div class="card">

<h3>Rutina</h3>

<select id="routineSelect"></select>

<input id="newRoutine" placeholder="Nueva rutina">

<button class="add" onclick="addRoutine()">Agregar rutina</button>

</div>

<div class="card">

<h3>Agregar ejercicio</h3>

<input id="exerciseName" placeholder="Ejercicio">

<button class="add" onclick="addExercise()">Agregar ejercicio</button>

</div>

<div class="card">

<h3>Entrenamiento</h3>

<div id="exerciseList"></div>

<button class="save" onclick="saveWorkout()">Guardar progreso</button>

</div>

<div class="card">

<h3>Progreso</h3>

<select id="progressExercise"></select>

<button onclick="showProgress()">Ver progreso</button>

<canvas id="chart"></canvas>

</div>

</div>

<script>

let routines = JSON.parse(localStorage.getItem("routines")) || {}

let routineSelect=document.getElementById("routineSelect")

function saveData(){
localStorage.setItem("routines",JSON.stringify(routines))
}

function addRoutine(){

let name=document.getElementById("newRoutine").value
if(!name)return

routines[name]={exercises:{}}

let option=document.createElement("option")
option.value=name
option.textContent=name

routineSelect.appendChild(option)

document.getElementById("newRoutine").value=""

saveData()

}

function addExercise(){

let routine=routineSelect.value
let name=document.getElementById("exerciseName").value

if(!routine||!name)return

if(!routines[routine].exercises[name]){
routines[routine].exercises[name]=[]
}

renderExercises()
updateProgressList()

document.getElementById("exerciseName").value=""

saveData()

}

function deleteExercise(ex){

let routine=routineSelect.value

if(confirm("Eliminar ejercicio?")){

delete routines[routine].exercises[ex]

saveData()

renderExercises()
updateProgressList()

}

}

function getLastStats(data){

if(data.length===0)return {weight:"",reps:""}

return data[data.length-1]

}

function renderExercises(){

let routine=routineSelect.value
let container=document.getElementById("exerciseList")

container.innerHTML=""

if(!routine)return

Object.keys(routines[routine].exercises).forEach(ex=>{

let data=routines[routine].exercises[ex]
let last=getLastStats(data)

let div=document.createElement("div")
div.className="exercise"

div.innerHTML=`
<b>${ex}</b>
<button class="delete" onclick="deleteExercise('${ex}')">❌</button>
<div class="lastStats">Último: ${last.weight || "-"} kg x ${last.reps || "-"} reps</div>
Peso <input type="number" id="w_${ex}" value="${last.weight || ""}">
Reps <input type="number" id="r_${ex}" value="${last.reps || ""}">
`

container.appendChild(div)

})

}

routineSelect.addEventListener("change",()=>{

renderExercises()
updateProgressList()

})

function saveWorkout(){

let routine=routineSelect.value
let date=new Date().toLocaleDateString()

Object.keys(routines[routine].exercises).forEach(ex=>{

let w=document.getElementById("w_"+ex).value
let r=document.getElementById("r_"+ex).value

if(w){

routines[routine].exercises[ex].push({
date:date,
weight:Number(w),
reps:Number(r)
})

}

})

saveData()

renderExercises()

alert("Progreso guardado 💪")

}

function updateProgressList(){

let routine=routineSelect.value
let select=document.getElementById("progressExercise")

select.innerHTML=""

if(!routine)return

Object.keys(routines[routine].exercises).forEach(ex=>{

let option=document.createElement("option")
option.value=ex
option.textContent=ex

select.appendChild(option)

})

}

let chart

function showProgress(){

let routine=routineSelect.value
let ex=document.getElementById("progressExercise").value

let data=routines[routine].exercises[ex]

let labels=data.map(d=>d.date)
let weights=data.map(d=>d.weight)

if(chart)chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:labels,
datasets:[{
label:"Peso (kg)",
data:weights,
borderColor:"#00ff95",
fill:false
}]
}

})

}

function loadRoutines(){

Object.keys(routines).forEach(r=>{

let option=document.createElement("option")
option.value=r
option.textContent=r

routineSelect.appendChild(option)

})

}

loadRoutines()

</script>

</body>
</html>
